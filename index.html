<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIOPORT - Cyberpunk Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-cyan: #00f0ff;
            --cyber-red: #ff0055;
            --cyber-dark: #0b0b0f;
            --cyber-panel: #121218;
            --cyber-grey: #4e4e5a;
        }

        body {
            background-color: var(--cyber-dark);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 1px;
        }

        .radioport-container {
            width: 100%;
            max-width: 550px;
            background: var(--cyber-panel);
            border: 1px solid var(--cyber-red);
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.15);
            position: relative;
        }

        .header {
            border: 1px solid var(--cyber-red);
            padding: 8px 15px;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
            color: var(--cyber-cyan);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-tag {
            font-size: 10px;
            color: var(--cyber-red);
        }

        .now-playing-panel {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 0, 85, 0.2);
            padding: 15px;
            margin-bottom: 20px;
        }

        /* Kontener na okładkę/logo */
        .cover-art {
            width: 120px;
            height: 120px;
            background: #1a1a24;
            border: 1px dashed var(--cyber-cyan);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Aby obrazek nie wystawał */
        }

        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Pokazuje CAŁY obrazek, bez ucinania */
            background-color: rgba(0, 0, 0, 0.3); /* Delikatne ciemne tło pod logo */
        }

        .cover-placeholder {
            color: var(--cyber-cyan);
            font-size: 12px;
            text-align: center;
            font-weight: 700;
            padding: 5px;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .track-label {
            font-size: 11px;
            color: var(--cyber-grey);
        }

        .track-title {
            font-size: 18px;
            color: var(--cyber-red);
            font-weight: 700;
            margin: 5px 0;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.3);
        }

        .track-artist {
            font-size: 14px;
            color: #fff;
            margin-bottom: 10px;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-left: 3px solid var(--cyber-cyan);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .3s;
            border: 1px solid var(--cyber-grey);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
        }

        input:checked + .slider {
            background-color: var(--cyber-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #000;
        }

        .station-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding-right: 5px;
        }

        .station-list::-webkit-scrollbar {
            width: 4px;
        }
        .station-list::-webkit-scrollbar-thumb {
            background: var(--cyber-red);
        }

        .station-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s ease-in-out;
            font-size: 15px;
        }

        .station-item:hover {
            background: rgba(0, 240, 255, 0.05);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .station-item.active {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--cyber-cyan);
            color: var(--cyber-cyan);
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }

        .station-item.off-button {
            border: 1px dotted rgba(255, 0, 85, 0.3);
            color: var(--cyber-red);
        }
        .station-item.off-button:hover {
            background: rgba(255, 0, 85, 0.1);
            border-color: var(--cyber-red);
        }

        .station-freq {
            font-weight: 700;
            margin-right: 15px;
            min-width: 55px;
        }

        audio {
            display: none;
        }

        .footer-hud {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 11px;
            color: var(--cyber-grey);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="radioport-container">
    <div class="header">
        <span>RADIOPORT</span>
        <span class="header-tag">SYS.VER_2.77</span>
    </div>

    <div class="now-playing-panel">
        <div class="cover-art" id="station-logo-container">
            <div class="cover-placeholder" id="station-placeholder">NO SIGNAL</div>
        </div>
        <div class="track-info">
            <div>
                <div class="track-label">NOW PLAYING</div>
                <div class="track-title" id="track-title">WYBIERZ STACJĘ</div>
                <div class="track-artist" id="track-artist">—</div>
            </div>
            <div class="track-label" id="playback-status">SYSTEM IDLE</div>
        </div>
    </div>

    <div class="controls-row">
        <div class="toggle-container">
            <span>PREZENTER / NEWSY:</span>
            <label class="switch">
                <input type="checkbox" id="news-toggle" onchange="toggleNewsMode()">
                <span class="slider"></span>
            </label>
        </div>
        <div style="font-size: 12px; display: flex; gap: 10px;">
            <span>VOL:</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)" style="accent-color: var(--cyber-cyan); width: 80px;">
        </div>
    </div>

    <div class="station-list" id="station-list">
        <div class="station-item off-button" id="station-off" onclick="turnRadioOff()">
            <span class="station-freq">OFF</span> <span>WYŁĄCZ RADIO (BRAK STACJI)</span>
        </div>
    </div>

    <audio id="cyber-player" onended="trackEnded()"></audio>

    <div class="footer-hud">
        <span>WYBIERZ STACJĘ</span>
        <span>STATUS: ONLINE</span>
    </div>
</div>

<script>
    // 14 Stacji - Zastąp 'https://link_do_obrazka.png' swoimi linkami do zdjęć logo!
    const stations = [
        { name: "Pacific Dreams", freq: "88.9", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.Downtempo.png", playlist: [{ title: "Friday Night Fire Fight", artist: "The Rubicones", url: "https://cdn.pixabay.com/audio/2026/04/13/audio_9bee257339.mp3" }] },
        { name: "RADIO VEXELSTORM", freq: "89.3", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.AggroIndie.png", playlist: [{ title: "I Want to Stay at Your House", artist: "Rosa Walton", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }] },
        { name: "Growl FM", freq: "89.7", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.GrowlFM.png", playlist: [{ title: "Metropolis", artist: "DJ Kovalski", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" }] },
        { name: "Royal Blue Radio", freq: "91.9", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.Jazz.png", playlist: [{ title: "Graves", artist: "Konrad OldMoney", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" }] },
        { name: "Night FM", freq: "92.9", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.ElectroIndie.png", playlist: [{ title: "Tinfiddle", artist: "Sebastian Robertson", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3" }] },
        { name: "Samizdat Radio", freq: "95.2", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.MinimTech.png", playlist: [{ title: "Barrio", artist: "Chico", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" }] },
        { name: "Ritual FM", freq: "96.1", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.Metal.png", playlist: [{ title: "Never Fade Away", artist: "Samurai", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3" }] },
        { name: "Body Heat Radio", freq: "98.7", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.Pop.png", playlist: [{ title: "Quantum Chaos", artist: "Void", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" }] },
        { name: "Impulse", freq: "99.9", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.Impulse.png", playlist: [{ title: "Resist and Disorder", artist: "Rezodrone", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3" }] },
        { name: "The Dirge", freq: "101.9", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.HipHop.png", playlist: [{ title: "Practical Tracks", artist: "Pacific Rim", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3" }] },
        { name: "Radio PEBKAC", freq: "103.5", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.AggroTechno.png", playlist: [{ title: "Neo-Tokyo Synth", artist: "Vector", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3" }] },
        { name: "30 PRINCIPALES", freq: "106.9", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.Latino.png", playlist: [{ title: "Uprising", artist: "Sokolov", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3" }] },
        { name: "Morro Rock Radio", freq: "107.3", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.AttRock.png", playlist: [{ title: "Flatline", artist: "Sasha", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" }] },
        { name: "Dark Star", freq: "107.5", logoUrl: "https://static.zhincore.eu/cp/icons/radios/RadioStation.DarkStar.png", playlist: [{ title: "Street Kid Blues", artist: "V", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" }] }
    ];

    // Baza wiadomości (Podmień te adresy na swoje pliki z GitHuba!)
    const newsDatabase = {
        morning: [
            "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" // Przykład rano (dodaj więcej analogicznie)
        ],
        day: [ // 4 wiadomości na dzień
            "https://cdn.pixabay.com/audio/2022/09/20/audio_7e2920cf58.mp3", // News dzień 1
            "https://cdn.pixabay.com/audio/2025/09/08/audio_b80f55a35a.mp3", // News dzień 2
        ],
        night: [ // 3 wiadomości na noc
            "https://actions.google.com/sounds/v1/alarms/mechanical_clock_ring.ogg", // News noc 1
            "https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg", // News noc 2
            "https://actions.google.com/sounds/v1/alarms/dinner_bell.ogg" // News noc 3
        ]
    };

    // Tablice pomocnicze do zapamiętywania odtworzonych newsów (zapobiegają powtórzeniom)
    let playedNewsHistory = {
        morning: [],
        day: [],
        night: []
    };

    let currentStationIndex = null;
    let currentTrackIndex = 0;
    let playedSongsCounter = 0;
    let isPlayingNews = false;
    let newsEnabled = false;

    const player = document.getElementById('cyber-player');
    const stationListContainer = document.getElementById('station-list');
    const trackTitleUI = document.getElementById('track-title');
    const trackArtistUI = document.getElementById('track-artist');
    const logoContainerUI = document.getElementById('station-logo-container');
    const playbackStatusUI = document.getElementById('playback-status');

    function buildStationList() {
        stations.forEach((station, index) => {
            const div = document.createElement('div');
            div.className = 'station-item';
            div.id = `station-${index}`;
            div.onclick = () => selectStation(index);
            div.innerHTML = `<span class="station-freq">${station.freq}</span> <span>${station.name}</span>`;
            stationListContainer.appendChild(div);
        });
    }

    function selectStation(index) {
        clearActiveClasses();
        currentStationIndex = index;
        currentTrackIndex = 0;
        isPlayingNews = false;

        document.getElementById(`station-${index}`).classList.add('active');
        playCurrentTrack();
    }

    function turnRadioOff() {
        player.pause();
        player.src = "";
        clearActiveClasses();
        
        currentStationIndex = null;
        isPlayingNews = false;
        playedSongsCounter = 0;

        document.getElementById('station-off').classList.add('active');
        
        // Przywrócenie placeholdera
        logoContainerUI.innerHTML = `<div class="cover-placeholder" id="station-placeholder">NO SIGNAL</div>`;
        trackTitleUI.innerText = "RADIOPORT OFF";
        trackArtistUI.innerText = "—";
        playbackStatusUI.innerText = "SYSTEM IDLE";
    }

    function clearActiveClasses() {
        if (currentStationIndex !== null) {
            document.getElementById(`station-${currentStationIndex}`).classList.remove('active');
        }
        document.getElementById('station-off').classList.remove('active');
    }

    function playCurrentTrack() {
        const station = stations[currentStationIndex];
        const track = station.playlist[currentTrackIndex];

        // Ustawienie obrazka z URL zamiast tekstu
        logoContainerUI.innerHTML = `<img src="${station.logoUrl}" alt="${station.name}">`;
        
        trackTitleUI.innerText = track.title;
        trackArtistUI.innerText = track.artist;
        playbackStatusUI.innerText = "STREAMING...";

        player.src = track.url;
        player.play();
    }

    function trackEnded() {
        if (isPlayingNews) {
            isPlayingNews = false;
            playCurrentTrack();
        } else {
            playedSongsCounter++;
            // Zmiana: Wiadomości włączają się teraz co 4 utwory
            if (newsEnabled && playedSongsCounter >= 4) { 
                playedSongsCounter = 0;
                playNewsBasedOnTime();
            } else {
                nextTrack();
            }
        }
    }

    // Dobór newsa z systemem unikania powtórzeń (Inteligentna Kolejka)
    function playNewsBasedOnTime() {
        isPlayingNews = true;
        const currentHour = new Date().getHours();
        let periodKey = "";
        let timePeriodName = "";

        if (currentHour >= 6 && currentHour < 12) {
            periodKey = "morning";
            timePeriodName = "PORANNE WIADOMOŚCI";
        } else if (currentHour >= 12 && currentHour < 18) {
            periodKey = "day";
            timePeriodName = "POŁUDNIOWE WIADOMOŚCI";
        } else {
            periodKey = "night";
            timePeriodName = "NOCNY SERWIS INFORMACYJNY";
        }

        const fullList = newsDatabase[periodKey];
        let playedList = playedNewsHistory[periodKey];

        // Jeśli wszystkie newsy z danej pory dnia zostały już odtworzone, resetujemy historię
        if (playedList.length >= fullList.length) {
            playedList = [];
            playedNewsHistory[periodKey] = [];
        }

        // Filtrujemy tylko te newsy, które jeszcze NIE były odtworzone
        const availableNews = fullList.filter(url => !playedList.includes(url));

        // Wybieramy losowy news z dostępnych nieodtworzonych
        const randomNewsUrl = availableNews[Math.floor(Math.random() * availableNews.length)];
        
        // Zapisujemy wybrany utwór do historii
        playedNewsHistory[periodKey].push(randomNewsUrl);

        // Wyświetlanie informacji na ekranie
        logoContainerUI.innerHTML = `<div class="cover-placeholder" style="color: var(--cyber-red); font-size: 24px;">⚠️</div>`;
        trackTitleUI.innerText = `⚠️ ${timePeriodName} ⚠️`;
        trackArtistUI.innerText = "NIGHT CITY RADIO INFO";
        playbackStatusUI.innerText = "BROADCASTING...";

        player.src = randomNewsUrl;
        player.play();
    }

    function nextTrack() {
        const station = stations[currentStationIndex];
        currentTrackIndex = (currentTrackIndex + 1) % station.playlist.length;
        playCurrentTrack();
    }

    function toggleNewsMode() {
        newsEnabled = document.getElementById('news-toggle').checked;
        playedSongsCounter = 0;
    }

    function changeVolume(val) {
        player.volume = val;
    }

    buildStationList();
</script>

</body>
</html>
